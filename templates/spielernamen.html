<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spielrunde vorbereiten</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="page page-setup">
  <main class="setup-shell">
    <section class="setup-card">
      <div class="hero-badge">Lobby</div>
      <h1>Spielrunde vorbereiten</h1>
      <p class="hero-copy">
        Vergib für alle {{ anzahl }} Plätze einen Namen. Leere Felder werden automatisch mit
        passenden Standardnamen ergänzt, damit ihr ohne Unterbrechung starten könnt.
      </p>

      <form method="post" class="players-form">
        {% for i in range(1, anzahl + 1) %}
        <label class="field-label" for="spieler{{ i }}">Spieler {{ i }}</label>
        <input id="spieler{{ i }}" type="text" name="spieler{{ i }}" placeholder="Spieler {{ i }}" required>
        {% endfor %}

        <div class="form-actions">
          <a href="{{ url_for('index') }}" class="secondary-link">Zurück</a>
          <button type="submit" class="primary-btn">Spiel öffnen</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
