<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spassmonopoly Deluxe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="page page-home">
  <main class="hero-shell">
    <section class="hero-card">
      <div class="hero-badge">Browser Game</div>
      <h1>Spassmonopoly Deluxe</h1>
      <p class="hero-copy">
        Trinkspiel trifft Brettspiel: stabil, modern und direkt im Browser spielbar.
        Starte eine neue Runde und lass die Spieler nacheinander ueber das Feld ziehen.
      </p>

      <form method="post" class="stack-form">
        <label class="field-label" for="anzahl">Wie viele Spieler machen mit?</label>
        <input id="anzahl" type="number" name="anzahl" min="2" max="8" value="4" required>
        <button type="submit" class="primary-btn">Neue Runde starten</button>
      </form>

      <div class="feature-row">
        <div class="feature-pill">2 bis 8 Spieler</div>
        <div class="feature-pill">Responsives Spielfeld</div>
        <div class="feature-pill">Mit oder ohne MySQL</div>
      </div>
    </section>
  </main>
</body>
</html>
