<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spassmonopoly Deluxe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="page page-board">
  <main class="game-shell">
    <header class="command-bar panel-card">
      <div class="command-brand">
        <div class="hero-badge">Live Runde</div>
        <h1>Spassmonopoly Deluxe</h1>
        <p class="panel-copy">
          Kompakter Spielfluss ohne nerviges Hochscrollen, mit klarer Zugsteuerung und Fokus auf das aktive Feld.
        </p>
      </div>

      <section class="turn-card">
        <div class="panel-heading">
          <h2>Zugstatus</h2>
          <span id="phaseChip" class="status-chip"></span>
        </div>
        <div id="turnSummary" class="turn-summary"></div>
      </section>

      <section class="command-actions-wrap">
        <div id="commandActions" class="command-actions"></div>
        <form method="post" action="{{ url_for('neues_spiel') }}">
          <button type="submit" class="secondary-btn full-width">Neue Runde</button>
        </form>
      </section>
    </header>

    <section class="board-layout">
      <aside class="side-panel">
        <div class="panel-card panel-scroll-card">
          <div class="panel-heading">
            <h2>Spieler</h2>
            <span id="playerCountChip" class="status-chip"></span>
          </div>
          <div id="scoreList" class="score-list"></div>
        </div>
      </aside>

      <section class="board-section">
        <div class="board-stage">
          <div class="board-toolbar">
            <div>
              <div class="hero-badge">Spielfeld</div>
              <p class="board-copy">Klick auf ein Feld fuer Details. Aktive Feldaktionen erscheinen direkt als Modal.</p>
            </div>
            <button id="currentFieldButton" type="button" class="secondary-btn">Aktuelles Feld</button>
          </div>

          <div class="board-frame">
            <div id="boardGrid" class="board-grid"></div>

            <section class="board-center-card">
              <div class="hero-badge">Zentrale</div>
              <h2 id="centerTitle">Bereit</h2>
              <p id="centerCopy" class="center-copy"></p>

              <div id="diceDisplay" class="dice-display">
                <img id="w1" src="{{ url_for('static', filename='dice/1.png') }}" alt="Wuerfel eins">
                <img id="w2" src="{{ url_for('static', filename='dice/1.png') }}" alt="Wuerfel zwei">
              </div>

              <div id="rollStatus" class="roll-status"></div>
            </section>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-card panel-scroll-card">
          <div class="panel-heading">
            <h2>Besitz</h2>
            <span id="ownershipCountChip" class="status-chip"></span>
          </div>
          <div id="ownershipList" class="ownership-list"></div>
        </div>

        <div class="panel-card panel-scroll-card">
          <div class="panel-heading">
            <h2>Spielverlauf</h2>
            <span class="status-chip">Live</span>
          </div>
          <div id="eventLog" class="event-log"></div>
        </div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="fieldModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card">
      <button type="button" class="modal-close" aria-label="Schliessen" onclick="closeFieldModal()">X</button>
      <div id="fieldModalContent"></div>
    </div>
  </div>

  <script>
    window.gameData = {{ game_state|tojson }};
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
